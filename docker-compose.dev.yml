services:
  taxmate-australia:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    working_dir: /workspaces/taxmate-australia
    command: /bin/bash
    stdin_open: true
    tty: true
    volumes:
      - .:/workspaces/taxmate-australia
      - taxmate-cache:/workspaces/taxmate-australia/.cache

volumes:
  taxmate-cache:
