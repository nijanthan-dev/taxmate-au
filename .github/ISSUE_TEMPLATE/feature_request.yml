name: Feature request
description: Propose a source-backed TaxMate Australia improvement
title: "Feature: "
labels: ["enhancement"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
    validations:
      required: true
  - type: textarea
    id: sources
    attributes:
      label: Source basis
      description: Link official ATO or government sources where relevant.
    validations:
      required: false
  - type: textarea
    id: safety
    attributes:
      label: Conservative handling
      description: Explain what should remain Accountant review.
    validations:
      required: true
